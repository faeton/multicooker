name: hello-task
timeout_s: 120          # dummy flavor finishes in seconds
judge_timeout_s: 60

# Sanitized example: participants and judges all use the `dummy` flavor,
# which runs locally in alpine without any LLM credentials. Replace with
# claude/codex/gemini when you want a real bake-off.
participants:
  - { name: a, flavor: dummy }
  - { name: b, flavor: dummy }
  - { name: c, flavor: dummy }

judges:
  - { name: judge-1, flavor: dummy }

rubric:
  scale: [0, 5]
  dimensions:
    - id: correctness
      weight: 40
    - id: quality
      weight: 25
    - id: honesty
      weight: 20
    - id: completeness
      weight: 15
