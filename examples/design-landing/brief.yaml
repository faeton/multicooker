name: design-landing
timeout_s: 600            # design tasks: give the model room to think
judge_timeout_s: 300

# Real LLM agents. Need at least one subscription credential set up
# (see docs/auth.md). Comment out flavors you don't have creds for.
participants:
  - { name: claude, flavor: claude }
  - { name: codex,  flavor: codex }
  - { name: agy, flavor: agy }
  - { name: grok,   flavor: grok }

# Anti-self-judge: each judge scores everyone except its own flavor.
# Two judges of different flavors give robust coverage — each participant
# is scored by at least one non-self judge. Add a third (e.g. agy-judge
# or grok-judge) if you want symmetric coverage at higher cost.
judges:
  - { name: claude-judge, flavor: claude }
  - { name: codex-judge,  flavor: codex }

rubric:
  scale: [0, 5]
  dimensions:
    - id: visual-hierarchy
      weight: 25
    - id: typography
      weight: 20
    - id: color-discipline
      weight: 20
    - id: content-fit
      weight: 20
    - id: polish
      weight: 15
