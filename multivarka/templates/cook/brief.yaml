name: PLACEHOLDER          # filled in by `multivarka new`
timeout_s: 1800            # 30 min per participant
judge_timeout_s: 900       # 15 min per judge

participants:
  - name: claude
    flavor: claude
  - name: codex
    flavor: codex
  - name: gemini
    flavor: gemini

judges:
  # By default we use claude + gemini. Codex would also work, but if any
  # of these flavors also appear as participants the judge will skip itself
  # (anti-self-judging rule).
  - name: claude-judge
    flavor: claude
  - name: gemini-judge
    flavor: gemini

# rubric_dimensions controls what JUDGE_BRIEF.md asks the judge to score.
# Edit JUDGE_BRIEF.md if you add dimensions here.
rubric:
  scale: [0, 5]
  dimensions:
    - id: correctness
      weight: 40
    - id: quality
      weight: 25
    - id: honesty
      weight: 20
    - id: completeness
      weight: 15
